openapi: 3.1.0
info:
  title: FORT Zoho Connector
  version: 1.0.0

servers:
  - url: http://localhost:3000

paths:
  /leads:
    get:
      operationId: getLeads
      summary: Get leads
      responses:
        "200":
          description: OK

  /search:
    get:
      operationId: searchLeads
      summary: Search leads
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /contacts:
    get:
      operationId: searchContacts
      summary: Search contacts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK