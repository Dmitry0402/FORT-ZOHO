openapi: 3.1.0
info:
  title: FORT Zoho Connector
  version: 1.0.0

servers:
  - url: https://fort-zoho.onrender.com

paths:
  /leads:
    get:
      operationId: getLeads
      summary: Get Zoho CRM leads
      responses:
        "200":
          description: OK

  /search:
    get:
      operationId: searchLeads
      summary: Search Zoho CRM leads
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /contacts:
    get:
      operationId: searchContacts
      summary: Search Zoho CRM contacts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK