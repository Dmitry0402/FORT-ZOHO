openapi: 3.1.0

info:
  title: FORT Zoho Connector
  version: 1.0.0

servers:
  - url: https://fort-zoho-1.onrender.com

paths:
  /leads:
    get:
      operationId: getLeads
      summary: Get Zoho CRM leads
      responses:
        "200":
          description: OK

  /search:
    get:
      operationId: searchLeads
      summary: Search Zoho CRM leads
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /contacts:
    get:
      operationId: searchContacts
      summary: Search Zoho CRM contacts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /createLead:
    post:
      operationId: createLead
      summary: Create a lead in Zoho CRM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Company
                - Last_Name
              properties:
                Company:
                  type: string
                Last_Name:
                  type: string
                First_Name:
                  type: string
                Designation:
                  type: string
                  description: Job title of the lead
                Email:
                  type: string
                  format: email
                Phone:
                  type: string
      responses:
        "200":
          description: Lead created successfully
